name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: marketplace
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d marketplace"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/marketplace?sslmode=disable
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/marketplace_test?sslmode=disable
      JWT_SECRET: ci_jwt_secret_with_at_least_32_characters_long
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 720h
      HTTP_PORT: 8080

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download deps
        run: go mod download

      - name: Create test database
        run: psql postgresql://postgres:postgres@localhost:5432/postgres -c "CREATE DATABASE marketplace_test;"

      - name: Run migrations
        run: go run github.com/pressly/goose/v3/cmd/goose@v3.26.0 -dir migrations postgres "$DATABASE_URL" up

      - name: Check gofmt
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$fmt_out"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60.3

      - name: Tests
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out